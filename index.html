<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Owen's Summer 2026 Savings</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;
    --border:#2a3a52;--border2:#354a66;
    --bc:#3b82f6;--bcbg:#1e3a5f;
    --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
    --accent:#6366f1;--red:#ef4444;--green:#22c55e;
    --radius:12px;
  }
  html{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
  body{max-width:860px;margin:0 auto;padding:16px 12px 40px}
  h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px}
  h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
  .mono{font-family:'DM Mono',monospace}
  /* ── Dashboard ── */
  .dash{background:linear-gradient(135deg,#0d1629 0%,#152040 100%);border:1px solid var(--border2);border-radius:16px;padding:20px 18px;margin-bottom:16px}
  .dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .dash-sub{font-size:11px;color:var(--txt3);margin-top:3px}
  .days-logged{text-align:right;font-size:11px;color:var(--txt3)}
  .days-logged b{display:block;font-size:17px;font-weight:700;color:var(--txt);font-family:'DM Mono',monospace}
  .pace-box{border-radius:12px;padding:14px 16px;margin-bottom:14px;text-align:center}
  .pace-box.neutral{background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.2)}
  .pace-box.ahead{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25)}
  .pace-box.behind{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25)}
  .pace-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
  .pace-amt{font-size:34px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
  .pace-note{font-size:11px;color:var(--txt3);margin-top:4px}
  .bar-wrap{margin-bottom:14px}
  .bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:5px}
  .bar-bg{height:10px;background:#1e2d42;border-radius:5px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease;background:linear-gradient(90deg,var(--bc),var(--accent))}
  .bar-fill.done{background:var(--green)}
  .bar-pct{font-size:10px;color:var(--txt3);margin-top:3px;text-align:right}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .stat-label{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .stat-val{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;line-height:1.15}
  .stat-sub{font-size:11px;color:var(--txt3);margin-top:2px}
  .sep-note{margin-top:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:8px 12px;font-size:11px;color:#a5b4fc;text-align:center}
  /* ── Section toggles ── */
  .section-toggle{display:flex;align-items:center;gap:6px;padding:10px 4px;cursor:pointer;user-select:none}
  .section-toggle h2{color:var(--txt)}
  .toggle-arrow{font-size:9px;color:var(--txt3);transition:transform 0.2s;display:inline-block}
  .toggle-arrow.open{transform:rotate(90deg)}
  /* ── Legend ── */
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .legend-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600}
  .legend-dot{width:6px;height:6px;border-radius:3px;flex-shrink:0}
  /* ── Month header ── */
  .month-head{font-size:12px;font-weight:700;color:var(--txt3);padding:12px 4px 6px;border-bottom:2px solid var(--border);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace}
  /* ── Week card ── */
  .week-card{margin-bottom:6px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .week-card.current-week{border-color:#fbbf24;box-shadow:0 0 0 1px #fbbf24}
  .week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);cursor:pointer;user-select:none;gap:6px}
  .week-card.current-week .week-header{background:#1e1900}
  .week-header-left{display:flex;align-items:center;gap:6px;min-width:0}
  .week-label{font-weight:600;font-size:13px;white-space:nowrap}
  .now-badge{font-size:9px;background:#fbbf24;color:#78350f;padding:1px 6px;border-radius:8px;font-weight:700}
  .type-dots{display:flex;gap:3px}
  .type-dot{width:6px;height:6px;border-radius:3px}
  .week-header-right{display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
  .week-goal{color:var(--txt3)}
  .week-diff{font-size:11px;font-weight:700;padding:1px 7px;border-radius:8px}
  .week-diff.pos{color:#16a34a;background:rgba(22,163,74,0.12)}
  .week-diff.neg{color:var(--red);background:rgba(239,68,68,0.1)}
  /* ── Day rows ── */
  .day-col-heads{display:flex;align-items:center;padding:4px 12px;font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid var(--border);background:#0e1520;gap:6px}
  .col-day{width:28px}.col-date{width:44px}.col-type{width:84px;text-align:center}
  .col-exp{width:52px;text-align:right}.col-act{flex:1;text-align:center}.col-diff{width:54px;text-align:right}
  .day-row{display:flex;align-items:center;padding:5px 12px;border-top:1px solid var(--border);gap:6px;background:var(--bg2)}
  .day-row.today-row{background:#1a1600}
  .day-row.wknd-row{background:#0d1118}
  .day-name{width:28px;font-size:11px;font-weight:600;color:var(--txt2)}.day-name.wknd{color:var(--txt3)}
  .day-date{width:44px;font-size:11px;color:var(--txt3)}
  .day-type-pill{width:84px;font-size:9px;font-weight:600;padding:2px 0;border-radius:8px;text-align:center;white-space:nowrap;overflow:hidden}
  .day-exp{width:52px;font-size:11px;color:var(--txt3);text-align:right}
  .day-act-cell{flex:1;display:flex;align-items:center;gap:3px}
  .mode-btn{font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid var(--border2);cursor:pointer;white-space:nowrap;flex-shrink:0;line-height:1.5;font-family:'DM Mono',monospace;transition:all 0.15s}
  .mode-btn.dollar{background:#0e1520;color:var(--txt3)}
  .mode-btn.hrs{background:#3d2e0a;color:#f59e0b;border-color:#f59e0b55}
  .day-input{width:100%;padding:3px 5px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:#0e1520;color:var(--txt);outline:none;text-align:center;font-family:'DM Mono',monospace}
  .day-input:focus{border-color:var(--accent);background:#111827}
  .day-input.has-val{border-color:#4ade8055;background:#0d2010}
  .day-input.xp-val{border-color:#f59e0b55;background:#1e1600}
  .day-diff-cell{width:54px;font-size:11px;font-weight:600;text-align:right}
  .week-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0e1520;border-top:1px solid var(--border);font-size:11px}
  .fill-btn{background:var(--bcbg);color:var(--bc);border:1px solid #1d4ed8;padding:4px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:11px}
  .all-logged{color:var(--green);font-weight:600}
  /* ── Expenses ── */
  .expenses-box{margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .expenses-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3)}
  .exp-label{font-size:13px;font-weight:700;color:var(--txt2)}
  .exp-month-card{border-top:1px solid var(--border);padding:12px 14px;background:var(--bg2)}
  .exp-month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .exp-breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
  .exp-breakdown-row.total-row{border-top:1px solid var(--border);margin-top:6px;padding-top:6px;font-weight:700;font-size:13px}
  .exp-extra-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .exp-input{padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:#0e1520;color:var(--txt);outline:none;font-family:'DM Mono',monospace}
  .exp-input:focus{border-color:var(--accent)}
  /* ── Paychecks ── */
  .pay-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .pay-card{border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .pay-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
  .pay-header.received{background:#0d2010}.pay-header.pending{background:#160f2d}.pay-header.upcoming{background:var(--bg3)}
  .pay-title{font-weight:700;font-size:13px}.pay-desc{font-size:11px;color:var(--txt3);margin-top:1px}
  .pay-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px}
  .pay-badge.received{color:#16a34a;background:rgba(22,163,74,0.12)}
  .pay-badge.pending{color:#a78bfa;background:rgba(139,92,246,0.12)}
  .pay-badge.upcoming{color:var(--txt3);background:var(--bg)}
  .pay-gross{font-size:17px;font-weight:800;margin-top:4px;font-family:'Syne',sans-serif}
  .pay-sources{padding:8px 14px;font-size:12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px}
  .pay-received-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:#080d14}
  .pay-alloc-toggle{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;cursor:pointer;user-select:none;background:#0e1520;border-top:1px solid var(--border)}
  .pay-alloc-label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--txt2)}
  .alloc-status{font-size:11px;font-weight:600}
  .alloc-body{padding:0 14px 12px;border-top:1px solid var(--border);background:var(--bg2)}
  .alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;margin-top:8px}
  .alloc-row input[type=text]{flex:1;min-width:0;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:#0e1520;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif}
  .alloc-row input[type=text]:focus{border-color:var(--accent)}
  .alloc-amt-wrap{position:relative;width:90px;flex-shrink:0}
  .alloc-amt-wrap .prefix{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--txt3);pointer-events:none}
  .alloc-amt-wrap input{width:100%;padding:4px 6px 4px 18px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:#0e1520;color:var(--txt);outline:none;text-align:right;font-family:'DM Mono',monospace}
  .alloc-amt-wrap input:focus{border-color:var(--accent)}
  .alloc-savings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px;border-top:1px dashed var(--border);margin-top:6px}
  .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;opacity:0.7}
  .del-btn:hover{opacity:1}
  .alloc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .add-alloc-btn{background:var(--bcbg);color:var(--bc);border:1px solid #1d4ed8;padding:4px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:11px}
  .alloc-totals{font-size:12px;text-align:right;color:var(--txt3)}
  /* ── Extra payments ── */
  .extra-pay-card{border:1px solid #3d2e0a;border-radius:10px;overflow:hidden;margin-bottom:8px}
  .extra-pay-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#1e1600}
  .xp-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
  .xp-badge.standalone{background:rgba(245,158,11,0.15);color:#f59e0b}
  .xp-badge.topaycheck{background:rgba(99,102,241,0.15);color:#a5b4fc}
  .add-xp-btn{background:#1e1600;color:#f59e0b;border:1px solid #3d2e0a;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;width:100%;margin-top:4px}
  /* ── Cash flow ── */
  .cashflow{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px}
  .cf-title{font-weight:700;margin-bottom:8px;color:var(--txt2)}
  .cf-row{display:flex;justify-content:space-between;margin-bottom:3px}
  .cf-row.total{font-weight:700;padding-top:6px;border-top:2px solid var(--border);font-size:13px}
  .cf-row.pending-row{color:#a5b4fc;margin-top:4px}
  .cf-row.true-total{font-weight:700;color:#a5b4fc}
  /* ── Charts ── */
  .chart-wrap{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:14px 14px 10px;margin-bottom:16px}
  .chart-title{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap}
  .chart-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt3)}
  .chart-legend-line{width:16px;height:2px;border-radius:1px}
  canvas{display:block;width:100%;border-radius:6px}
  /* ── Reset ── */
  .reset-wrap{text-align:center;margin-top:16px;padding-bottom:20px}
  .reset-btn{font-size:11px;color:var(--txt3);background:none;border:1px solid var(--border);padding:5px 14px;border-radius:6px;cursor:pointer}
  .reset-btn:hover{border-color:var(--red);color:var(--red)}
  @media(max-width:520px){
    .stat-grid{grid-template-columns:1fr 1fr}
    .stat-val{font-size:18px}
    .col-date,.day-date{display:none}
    body{padding:10px 8px 40px}
    .chart-wrap{padding:10px 10px 8px}
    canvas{max-height:150px !important}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
function dateRange(a,b){const r=[];let d=new Date(a+"T12:00:00");const e=new Date(b+"T12:00:00");while(d<=e){r.push(d.toISOString().slice(0,10));d=new Date(d);d.setDate(d.getDate()+1);}return r;}

const BC=new Set(["2026-06-15","2026-06-16","2026-06-17","2026-06-22","2026-06-23","2026-06-24","2026-06-25","2026-06-29","2026-06-30","2026-07-01","2026-07-06","2026-07-07","2026-07-08","2026-07-09","2026-07-20","2026-07-21","2026-07-22","2026-07-23","2026-07-27","2026-07-28","2026-07-29","2026-07-30","2026-08-03","2026-08-04","2026-08-05"]);
const ML=new Set(["2026-06-03","2026-06-04","2026-06-05","2026-06-08","2026-06-09","2026-06-10","2026-06-11","2026-06-12","2026-06-18","2026-06-19","2026-06-26","2026-07-02","2026-07-17","2026-07-24"]);
const NW=new Set(dateRange("2026-05-21","2026-06-02"));
const BP=new Set(dateRange("2026-07-10","2026-07-16"));
const J4=new Set(dateRange("2026-07-03","2026-07-05"));
const BN=new Set(["2026-07-31","2026-08-01","2026-08-02","2026-08-06","2026-08-07"]);

// Pay rates — verified:
// BC: $16.87/hr × 7.5hrs = $126.525 ≈ $126.53/day
// ML: $16.57/hr × 6.5hrs = $107.705 ≈ $107.71/day
const BC_RATE=16.87, BC_HRS=7.5, BC_DAILY=126.53;
const ML_RATE=16.57, ML_HRS=6.5, ML_DAILY=107.71;
const FR_DAILY=50;

const BASE_EXP_DATES=["2026-05-07","2026-06-07","2026-07-07","2026-08-07"];
// Monthly expense breakdown (net $240 out-of-pocket):
// $370 total outgoing: $197 insurance + $75 gas (default) + $30 emergency + remainder fun
// $130 received monthly (car payment contribution) → net = $240
const EXP_NET=240;
const EXP_INSURANCE=197, EXP_GAS_DEFAULT=75, EXP_EMERGENCY=30;

const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep"];
const START_BAL=300;
const DEF_ALLOC={
  p0:[{l:"Car maintenance (dad)",a:250},{l:"Gas/emergency fund",a:50},{l:"Savings account",a:480,isSavings:true}]
};
const STORAGE_KEY="owen-savings-2026-v4";

function getInfo(ds){
  if(BC.has(ds))  return{t:"bc", l:"Boulder County",e:BC_DAILY,cl:"#3b82f6",bg:"#1e3a5f"};
  if(ML.has(ds))  return{t:"ml", l:"Mobile Lab",    e:ML_DAILY,cl:"#22c55e",bg:"#14391f"};
  if(NW.has(ds))  return{t:"off",l:"Norway",         e:0,       cl:"#64748b",bg:"#1e2a38"};
  if(BP.has(ds))  return{t:"off",l:"RMNP",           e:0,       cl:"#64748b",bg:"#1e2a38"};
  if(J4.has(ds))  return{t:"off",l:"4th July",       e:0,       cl:"#64748b",bg:"#1e2a38"};
  if(BN.has(ds))  return{t:"off",l:"Band Camp",      e:0,       cl:"#64748b",bg:"#1e2a38"};
  const dow=new Date(ds+"T12:00:00").getDay();
  if(dow===0||dow===6) return{t:"wk",l:"Weekend",    e:0,       cl:"#475569",bg:"#141e2e"};
  return{t:"fr",l:"Freelance",e:FR_DAILY,cl:"#f59e0b",bg:"#3d2e0a"};
}
function fmt(n){return"$"+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function fmts(n){return"$"+Math.abs(Math.round(n)).toLocaleString();}

// ─── SYNC ────────────────────────────────────────────────────────────────────
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw8S3rC7s1SGF0WTyc7KjrLeTNOOWeMUiMVQvF2YNlmzC6D9EuDlBIc9dcwB3iUiAXu/exec";
const SYNC_ENABLED=SCRIPT_URL!=="YOUR_SCRIPT_URL_HERE";
let syncTimeout=null,lastSyncedJSON=null;

function setSyncStatus(s){
  const el=document.getElementById('sync-status');if(!el)return;
  const map={
    idle:{text:"Sync ready",color:"var(--txt3)"},
    loading:{text:"⟳ Loading…",color:"#fbbf24"},
    saving:{text:"⟳ Saving…",color:"#fbbf24"},
    saved:{text:"✓ Synced",color:"#4ade80"},
    error:{text:"⚠ Sync failed – saved locally",color:"#fb923c"},
    offline:{text:"Sync not set up",color:"var(--txt3)"},
  };
  const i=map[s]||map.idle;el.textContent=i.text;el.style.color=i.color;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let state={
  act:{},       // {ds: dollars stored} — always stored as $, converted for display
  actMode:{},   // {ds: '$'|'bc_hrs'|'ml_hrs'}
  actLabel:{},  // {ds: note string}
  alloc:{},     // {pid: [{l,a,isSavings?}]}
  allocSavings:{}, // {pid: override savings amount or null}
  payActual:{}, // {pid: actual received dollars}
  expExtra:{},  // {monthKey: [{l,a}]}
  expGas:{},    // {monthKey: gas amount override}
  extraPay:[],  // [{id,date,label,amount,type,alloc:[],allocSavings:null}]
  ui:{}
};

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);Object.assign(state,d);
      // ensure new keys exist
      if(!state.allocSavings)state.allocSavings={};
      if(!state.expGas)state.expGas={};
      if(!state.actLabel)state.actLabel={};
    }
  }catch(e){}
}
function saveStateLocal(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function saveState(){saveStateLocal();if(!SYNC_ENABLED)return;if(syncTimeout)clearTimeout(syncTimeout);setSyncStatus("saving");syncTimeout=setTimeout(()=>pushToSheets(),1500);}
async function pushToSheets(){
  const payload=JSON.stringify(state);
  if(payload===lastSyncedJSON){setSyncStatus("saved");return;}
  try{await fetch(SCRIPT_URL+"?action=save&data="+encodeURIComponent(payload),{mode:"no-cors"});lastSyncedJSON=payload;setSyncStatus("saved");}
  catch(e){setSyncStatus("error");}
}
async function pullFromSheets(){
  if(!SYNC_ENABLED){setSyncStatus("offline");return;}
  setSyncStatus("loading");
  return new Promise(resolve=>{
    const cb="syncCb_"+Date.now();const sc=document.createElement("script");
    const t=setTimeout(()=>{delete window[cb];sc.remove();setSyncStatus("error");resolve();},8000);
    window[cb]=json=>{
      clearTimeout(t);delete window[cb];sc.remove();
      try{
        if(json.status==="ok"&&json.data){
          const d=JSON.parse(json.data),localUI=state.ui;
          Object.assign(state,d);state.ui=localUI;
          if(!state.allocSavings)state.allocSavings={};
          if(!state.expGas)state.expGas={};
          if(!state.actLabel)state.actLabel={};
          saveStateLocal();lastSyncedJSON=JSON.stringify(state);setSyncStatus("saved");
        }else setSyncStatus(json.data===null?"saved":"error");
      }catch(e){setSyncStatus("error");}
      resolve();
    };
    sc.src=SCRIPT_URL+"?action=load&callback="+cb;document.head.appendChild(sc);
  });
}

const allDays=dateRange("2026-04-16","2026-08-31").map(ds=>{
  const d=new Date(ds+"T12:00:00");
  return{ds,...getInfo(ds),dow:d.getDay(),mo:d.getMonth(),dy:d.getDate()};
});
function buildWeeks(){const r=[];let w=[];for(const d of allDays){if(d.dow===1&&w.length){r.push(w);w=[];}w.push(d);}if(w.length)r.push(w);return r;}
const weeks=buildWeeks();
function getToday(){return new Date().toISOString().slice(0,10);}

// Build a map of standalone extra pay by date for quick lookup
function buildExtraPayByDate(extraPay){
  const m={};
  (extraPay||[]).filter(x=>x.type==="standalone").forEach(x=>{
    if(!m[x.date])m[x.date]=0;
    m[x.date]+=(x.amount||0);
  });
  return m;
}

function computePayPeriods(act,extraPay,today){
  const pds=[
    {id:"p0",label:"End of April",  desc:"Mar 16 – Apr 15",by:"2026-04-30",fixed:true,gross:780},
    {id:"p1",label:"End of May",    desc:"Apr 16 – May 15",by:"2026-05-31",s:"2026-04-16",e:"2026-05-15"},
    {id:"p2",label:"End of June",   desc:"May 16 – Jun 15",by:"2026-06-30",s:"2026-05-16",e:"2026-06-15"},
    {id:"p3",label:"End of July",   desc:"Jun 16 – Jul 15",by:"2026-07-31",s:"2026-06-16",e:"2026-07-15"},
    {id:"p4",label:"End of August", desc:"Jul 16 – Aug 15",by:"2026-08-31",s:"2026-07-16",e:"2026-08-15"},
    {id:"p5",label:"End of Sep",    desc:"Aug 16 – Aug 31",by:"2026-09-30",s:"2026-08-16",e:"2026-08-31",pending:true},
  ];
  return pds.map(p=>{
    if(p.fixed){const received=p.by<=today;return{...p,bcN:0,mlN:0,frN:0,bcA:0,mlA:0,frA:0,gross:780,received,actTotal:0,extraBonus:0,projGross:780};}
    const days=allDays.filter(d=>d.ds>=p.s&&d.ds<=p.e);
    const bc=days.filter(d=>d.t==="bc"),ml=days.filter(d=>d.t==="ml"),fr=days.filter(d=>d.t==="fr");
    const bcA=bc.length*BC_DAILY,mlA=ml.length*ML_DAILY,frA=fr.length*FR_DAILY;
    const gross=bcA+mlA+frA;
    const actTotal=days.reduce((s,d)=>s+(act[d.ds]??0),0);
    const unlogged=days.filter(d=>act[d.ds]===undefined).reduce((s,d)=>s+d.e,0);
    const extraBonus=(extraPay||[]).filter(x=>x.type==="topaycheck"&&x.date>=p.s&&x.date<=p.e).reduce((s,x)=>s+(x.amount||0),0);
    const projGross=actTotal+unlogged+extraBonus;
    const received=p.by<=today;
    return{...p,bcN:bc.length,mlN:ml.length,frN:fr.length,bcA,mlA,frA,gross,actTotal,projGross,received,extraBonus};
  });
}

function monthTotalExp(mk){
  const gas=(state.expGas||{})[mk]??EXP_GAS_DEFAULT;
  const extras=((state.expExtra||{})[mk]||[]).reduce((s,e)=>s+(e.a||0),0);
  // Total outgoing = insurance + gas + emergency + extras
  // Net = total outgoing - $130 received = shown as $240 base + extras
  return EXP_NET+extras; // EXP_NET=240 already accounts for the $130 offset
}

// Compute auto savings for an allocation set given a base amount
function computeAutoSavings(pid,alloc,baseAmt,allocSavingsOverride){
  const al=(alloc[pid]||[]).filter(a=>!a.isSavings);
  const nonSavingsTotal=al.reduce((s,a)=>s+(a.a||0),0);
  const override=(allocSavingsOverride||{})[pid];
  if(override!==undefined&&override!==null) return override;
  return Math.max(0,baseAmt-nonSavingsTotal);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const today=getToday();
  const{act,ui,alloc,allocSavings,payActual,expExtra,expGas,extraPay}=state;
  const pp=computePayPeriods(act,extraPay,today);
  const xpByDate=buildExtraPayByDate(extraPay);

  const standaloneTotal=(extraPay||[]).filter(x=>x.type==="standalone").reduce((s,x)=>s+(x.amount||0),0);
  const entered=new Set(Object.keys(act).filter(ds=>act[ds]>0||xpByDate[ds]>0));
  // Total daily earned (act values stored as $) + standalone extra
  const totalActDays=Object.values(act).reduce((s,v)=>s+v,0);
  const totalAct=totalActDays+standaloneTotal;
  const totalExpAll=allDays.reduce((s,d)=>s+d.e,0);

  // Total expenses across all months
  const totalExpenses=BASE_EXP_DATES.reduce((s,d)=>s+monthTotalExp(d.slice(0,7)),0);
  const expPaid=BASE_EXP_DATES.filter(d=>d<=today).reduce((s,d)=>s+monthTotalExp(d.slice(0,7)),0);

  const p0Alloc=alloc.p0||[];
  const p0NonSavings=p0Alloc.filter(a=>!a.isSavings).reduce((s,a)=>s+(a.a||0),0);

  // Use payActual if set, else fall back to actTotal/projGross
  const cashReceived=pp.reduce((s,p)=>{
    if(!p.received)return s;
    const actual=payActual[p.id]!==undefined?payActual[p.id]:null;
    if(p.fixed)return s+(actual!==null?actual:p.gross);
    return s+(actual!==null?actual:p.actTotal||0);
  },0)+standaloneTotal;
  const curBal=START_BAL+(pp[0].received?cashReceived-p0NonSavings:cashReceived)-expPaid;

  const projReceivedByAug=pp.filter(p=>!p.pending).reduce((s,p)=>{
    const actual=payActual[p.id]!==undefined?payActual[p.id]:null;
    if(p.fixed)return s+(actual!==null?actual:p.gross)-p0NonSavings;
    return s+(actual!==null?actual:p.projGross||p.gross);
  },0)+standaloneTotal;
  const projBalAug31=START_BAL+projReceivedByAug-totalExpenses;
  const sepPP=pp.find(p=>p.pending);
  const pendingAmt=sepPP?(sepPP.projGross||sepPP.gross||0):0;
  const projBalTotal=projBalAug31+pendingAmt;
  const surplus=projBalAug31-5500;
  const pct=Math.min(100,Math.max(0,(curBal/5500)*100));

  // enteredDays: any day that has a daily log OR a standalone XP entry
  const enteredDays=new Set([...Object.keys(act),...Object.keys(xpByDate)]);
  // expected for all entered days (daily logs + XP days)
  const expForEntered=allDays.filter(d=>enteredDays.has(d.ds)).reduce((s,d)=>s+d.e,0);
  // actual for all entered days = daily inputs + standalone XP on those days
  const actForEntered=allDays.filter(d=>enteredDays.has(d.ds)).reduce((s,d)=>s+(act[d.ds]||0)+(xpByDate[d.ds]||0),0);
  const aheadBehind=actForEntered-expForEntered;
  const isAhead=aheadBehind>=0;
  const remainToEarn=Math.max(0,5680-totalAct);

  // ── Pace box ──
  const paceHtml=enteredDays.size===0
    ?`<div class="pace-box neutral"><div style="font-size:13px;color:var(--txt3);font-weight:500">Start logging days to track your progress</div></div>`
    :`<div class="pace-box ${isAhead?'ahead':'behind'}">
        <div class="pace-label" style="color:${isAhead?'#86efac':'#fdba74'}">${isAhead?'Ahead of Schedule':'Behind Schedule'}</div>
        <div class="pace-amt" style="color:${isAhead?'#4ade80':'#fb923c'}">${isAhead?'+':'−'}${fmt(Math.abs(aheadBehind))}</div>
        <div class="pace-note">vs expected across ${enteredDays.size} logged day${enteredDays.size!==1?'s':''}</div>
      </div>`;

  // ── Weeks ──
  let weeksHtml='',prevMo=-1;
  weeks.forEach((wk,wi)=>{
    const wExp=wk.reduce((s,d)=>s+d.e,0);
    const wActDays=wk.reduce((s,d)=>s+(act[d.ds]??0),0);
    const wActXP=wk.reduce((s,d)=>s+(xpByDate[d.ds]||0),0);
    const wAct=wActDays+wActXP;
    const hasE=wk.some(d=>act[d.ds]!==undefined||xpByDate[d.ds]>0);

    const diffHtml=hasE?`<span style="color:var(--txt);font-weight:700">${fmt(wAct)}</span><span class="week-diff ${wDiff>=0?'pos':'neg'}">${wDiff>=0?'+':'−'}${fmt(Math.abs(wDiff))}</span>`:'';

    let rowsHtml='';

        <span class="col-day">Day</span><span class="col-date">Date</span>
        <span class="col-type">Type</span><span class="col-exp">Expected</span>

      </div>`;

        // Combined actual = logged daily + any standalone XP on that date

        <div class="bar-pct">${Math.round(pct)}% of primary goal</div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-val">${fmts(totalAct)}</div><div class="stat-sub">of ${fmts(totalExpAll)} planned</div></div>
        <div class="stat-card"><div class="stat-label">Account Balance</div><div class="stat-val" style="color:${curBal>=5500?'#4ade80':'#fbbf24'}">${fmts(curBal)}</div><div class="stat-sub">cash in hand today</div></div>
        <div class="stat-card"><div class="stat-label">Projected Aug 31</div><div class="stat-val" style="color:${projBalAug31>=5500?'#4ade80':'#fbbf24'}">${fmts(projBalAug31)}</div><div class="stat-sub" style="color:${surplus>=0?'#4ade80':'#f87171'}">${surplus>=0?'+'+fmts(surplus)+' surplus':'−'+fmts(Math.abs(surplus))+' short'}</div></div>
        <div class="stat-card"><div class="stat-label">Still Need to Earn</div><div class="stat-val">${fmts(remainToEarn)}</div><div class="stat-sub">to guarantee $5,500</div></div>
      </div>
      ${pendingAmt>0?`<div class="sep-note">+${fmts(pendingAmt)} arriving in September → total: <b>${fmts(projBalTotal)}</b></div>`:''}
    </div>

    <!-- Cumulative chart — always visible -->
    <div class="chart-wrap">
      <div class="chart-title">
        <span>Cumulative Earnings vs Goal</span>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#6366f1"></div>Expected</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#4ade80"></div>Actual (ahead)</div>
          <div class="chart-legend-item"><div class="chart-legend-line" style="background:#ef4444"></div>Actual (behind)</div>
          <div class="chart-legend-item" style="gap:4px"><div style="width:16px;border-top:2px dashed #fbbf24"></div>$5,500</div>
        </div>
      </div>
      <canvas id="chart-cumulative" height="160"></canvas>
    </div>

    <!-- Weekly chart — always visible -->
    <div class="chart-wrap">
      <div class="chart-title">
        <span>Weekly Earnings: Goal vs Actual</span>
        <div class="chart-legend">
          <div class="chart-legend-item"><div style="width:8px;height:8px;border-radius:2px;background:#1e3a5f;border:1px solid #3b82f6"></div>Goal</div>
          <div class="chart-legend-item"><div style="width:8px;height:8px;border-radius:2px;background:#4ade80"></div>At/above</div>
          <div class="chart-legend-item"><div style="width:8px;height:8px;border-radius:2px;background:#fb923c"></div>Below</div>
        </div>
      </div>
      <canvas id="chart-weekly" height="150"></canvas>
    </div>

    <div class="section-toggle" onclick="toggle('pay')">
      <span class="toggle-arrow${ui.pay?' open':''}">&#9654;</span>
      <h2>Paycheck Schedule &amp; Allocations</h2>
    </div>
    ${payHtml}
    ${xpSectionHtml}

    <div class="legend">
      <span class="legend-pill" style="background:#1e3a5f;color:#3b82f6"><span class="legend-dot" style="background:#3b82f6"></span>Boulder County</span>
      <span class="legend-pill" style="background:#14391f;color:#22c55e"><span class="legend-dot" style="background:#22c55e"></span>Mobile Lab</span>
      <span class="legend-pill" style="background:#3d2e0a;color:#f59e0b"><span class="legend-dot" style="background:#f59e0b"></span>Freelance</span>
      <span class="legend-pill" style="background:#1e2a38;color:#64748b"><span class="legend-dot" style="background:#64748b"></span>Off</span>
      <span class="legend-pill" style="background:#141e2e;color:#475569"><span class="legend-dot" style="background:#475569"></span>Weekend</span>
    </div>
    ${weeksHtml}

    <div class="expenses-box">
      <div class="expenses-header">
        <span class="exp-label">Monthly Expenses</span>
        <span style="font-size:12px;color:var(--txt3)">${fmts(expPaid)} of ${fmts(totalExpenses)} paid</span>
      </div>
      ${expMonthsHtml}
    </div>

    <div class="reset-wrap"><button class="reset-btn" onclick="resetAll()">Reset All Data</button></div>
  `;

  // Draw charts
  // Small delay ensures DOM layout is complete before reading canvas dimensions
  setTimeout(()=>{
    drawCumulativeChart(allDays,act,extraPay,today);
    drawWeeklyChart(weeks,act,xpByDate);
  },50);

  if(!Object.keys(ui).some(k=>k.startsWith('w'))){
    const el=document.querySelector('.current-week');
    if(el) setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),100);
  }
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function getCtx(id){
  const canvas=document.getElementById(id);if(!canvas)return null;
  const dpr=window.devicePixelRatio||1;
  const h=parseInt(canvas.getAttribute('height'))||160;
  // Reset width so layout recalculates, then read from parent container
  canvas.style.width='100%';
  canvas.style.height=h+'px';
  const w=canvas.parentElement?canvas.parentElement.clientWidth||canvas.offsetWidth||340:canvas.offsetWidth||340;
  canvas.width=w*dpr;canvas.height=h*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx._w=w;ctx._h=h;return ctx;
}

function drawCumulativeChart(allDays,act,extraPay,today){
  const ctx=getCtx('chart-cumulative');if(!ctx)return;
  const W=ctx._w,H=ctx._h,PAD={t:16,r:18,b:28,l:52};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const todayIdx=allDays.findIndex(d=>d.ds===today);
  const xpByDate=buildExtraPayByDate(extraPay);

  let cumExp=0,cumAct=0;
  const expLine=[],actLine=[];
  allDays.forEach((d,i)=>{
    cumExp+=d.e; expLine.push(cumExp);
    if(i<=todayIdx){
      cumAct+=(act[d.ds]||0)+(xpByDate[d.ds]||0);
    }
    actLine.push(i<=todayIdx?cumAct:null);
  });

  const maxVal=Math.max(cumExp,5500)*1.05;
  const n=allDays.length;
  function xp(i){return PAD.l+(i/(n-1))*cW;}
  function yp(v){return PAD.t+cH-(v/maxVal)*cH;}

  ctx.fillStyle='#0e1520';ctx.beginPath();ctx.roundRect(0,0,W,H,8);ctx.fill();

  // Grid
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const y=yp(maxVal*f);
    ctx.strokeStyle='#1e2d42';ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText('$'+Math.round(maxVal*f/1000)+'k',PAD.l-4,y+3);
  });

  // Month dividers
  let prevMo=-1;
  allDays.forEach((d,i)=>{
    if(d.mo!==prevMo){prevMo=d.mo;
      const x=xp(i);ctx.strokeStyle='#2a3a52';ctx.lineWidth=1;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,H-PAD.b);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#475569';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
      ctx.fillText(['Apr','May','Jun','Jul','Aug'][d.mo-3]||'',x,H-PAD.b+14);
    }
  });

  // $5500 goal line
  const goalY=yp(5500);
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(PAD.l,goalY);ctx.lineTo(W-PAD.r,goalY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#fbbf24';ctx.font='bold 9px DM Mono,monospace';ctx.textAlign='right';
  ctx.fillText('$5,500',W-PAD.r-2,goalY-4);

  // Expected line (indigo)
  ctx.strokeStyle='#6366f1';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();expLine.forEach((v,i)=>i===0?ctx.moveTo(xp(i),yp(v)):ctx.lineTo(xp(i),yp(v)));ctx.stroke();

  // Actual line — colour by whether it's above or below expected
  const pts=actLine.map((v,i)=>v!==null?{x:xp(i),y:yp(v),v,exp:expLine[i]}:null).filter(Boolean);
  if(pts.length>1){
    // Draw segment by segment, coloring green if actual>=expected, red if below
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i];
      const ahead=p1.v>=p1.exp;
      ctx.strokeStyle=ahead?'#4ade80':'#ef4444';
      ctx.lineWidth=2.5;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
    }
    // Gradient fill
    const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
    const lastPt=pts[pts.length-1];
    const lastAhead=lastPt.v>=lastPt.exp;
    grad.addColorStop(0,lastAhead?'rgba(74,222,128,0.15)':'rgba(239,68,68,0.12)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grad;ctx.beginPath();
    ctx.moveTo(pts[0].x,H-PAD.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H-PAD.b);ctx.closePath();ctx.fill();
    // End dot
    ctx.fillStyle=lastAhead?'#4ade80':'#ef4444';
    ctx.beginPath();ctx.arc(lastPt.x,lastPt.y,4,0,Math.PI*2);ctx.fill();
  }

  // Today marker
  if(todayIdx>=0){
    const tx=xp(todayIdx);ctx.strokeStyle='#fbbf2460';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(tx,PAD.t);ctx.lineTo(tx,H-PAD.b);ctx.stroke();ctx.setLineDash([]);
  }
}

function drawWeeklyChart(weeks,act,xpByDate){
  const ctx=getCtx('chart-weekly');if(!ctx)return;
  const W=ctx._w,H=ctx._h,PAD={t:14,r:12,b:36,l:48};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const earningWeeks=weeks.filter(wk=>wk.some(d=>d.e>0));
  const wData=earningWeeks.map(wk=>{
    const exp=wk.reduce((s,d)=>s+d.e,0);
    const hasAct=wk.some(d=>act[d.ds]!==undefined||(xpByDate[d.ds]||0)>0);
    const actual=hasAct?wk.reduce((s,d)=>s+(act[d.ds]??0)+(xpByDate[d.ds]||0),0):null;
    const f=wk[0];
    return{exp,actual,label:['Apr','May','Jun','Jul','Aug'][f.mo-3]+' '+f.dy};
  });
  const maxVal=Math.max(...wData.map(w=>Math.max(w.exp,w.actual||0)))*1.15||500;
  const n=wData.length,groupW=cW/n,barW=Math.min(groupW*0.35,18);
  ctx.fillStyle='#0e1520';ctx.beginPath();ctx.roundRect(0,0,W,H,8);ctx.fill();
  function yp(v){return PAD.t+cH-(v/maxVal)*cH;}
  function yh(v){return(v/maxVal)*cH;}
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=yp(maxVal*f);ctx.strokeStyle='#1e2d42';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText('$'+Math.round(maxVal*f),PAD.l-4,y+3);
  });
  wData.forEach((w,i)=>{
    const cx=PAD.l+i*groupW+groupW/2;
    ctx.fillStyle='#1e3a5f';ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(cx-barW-2,yp(w.exp),barW,yh(w.exp),[3,3,0,0]);ctx.fill();ctx.stroke();
    if(w.actual!==null){
      ctx.fillStyle=w.actual>=w.exp?'#4ade80':'#fb923c';
      ctx.beginPath();ctx.roundRect(cx+2,yp(w.actual),barW,yh(w.actual),[3,3,0,0]);ctx.fill();
    }
    ctx.fillStyle='#475569';ctx.font='8px DM Sans,sans-serif';ctx.textAlign='center';
    const parts=w.label.split(' ');
    ctx.fillText(parts[0]||'',cx,H-PAD.b+12);ctx.fillText(parts[1]||'',cx,H-PAD.b+22);
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
const today=getToday();
const curWeekIdx=weeks.findIndex(wk=>wk.some(d=>d.ds===today));
if(curWeekIdx>=0&&!state.ui["w"+curWeekIdx]) state.ui["w"+curWeekIdx]=true;
render();
if(SYNC_ENABLED){pullFromSheets().then(()=>render());}
else{setTimeout(()=>setSyncStatus("offline"),50);}
</script>
