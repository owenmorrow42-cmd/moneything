function buildExpDedByPid(pp){const r={};EXP_DATES.forEach(d=>{const mk=d.slice(0,7);const extras=(state.expEx[mk]||[]).filter(e=>e.a>0);if(!extras.length)return;const sorted=pp.filter(p=>!p.pending).sort((a,b)=>a.by<b.by?-1:1);let prev=null;for(const p of sorted){if(p.by<d)prev=p;else break;}if(!prev)return;if(!r[prev.id])r[prev.id]=[];extras.forEach(e=>r[prev.id].push({l:e.l||'Extra expense',a:e.a}));});return r;}
function wkFrByDate(){const m={};Object.values(state.weekFr||{}).forEach(entries=>(entries||[]).forEach(e=>{const wd=e.workDate||'';if(!wd)return;m[wd]=(m[wd]||0)+(e.amount||0);}));return m;}

// Compute all earnings totals
function computeEarnTotals(td){
  const frByDate=wkFrByDate();const frTot=wkFrTotal();const bdayE=bdayEarned(td);
  const depByDate=depsEarnedByDate();
  const depTot=(state.deps||[]).filter(d=>d.dateRcvd&&d.dateRcvd<=td&&d.amtRcvd>0).reduce((s,d)=>s+(d.amtRcvd||0),0);
  const totActDays=Object.values(state.act).reduce((s,v)=>s+v,0);

  const depDatesInRange=Object.keys(depByDate).filter(k=>k>='2026-04-16'&&k<='2026-08-31');

function renderEarn(td,pp,totExp){

  let whtml='',prevMo=-1;

function getCtx(id){const c=document.getElementById(id);if(!c)return null;const dpr=window.devicePixelRatio||1,h=parseInt(c.getAttribute('height'))||160;c.style.width='100%';c.style.height=h+'px';const w=c.parentElement?c.parentElement.clientWidth||340:340;c.width=w*dpr;c.height=h*dpr;const ctx=c.getContext('2d');ctx.scale(dpr,dpr);ctx._w=w;ctx._h=h;return ctx;}
function rr(ctx,x,y,w,h,r){try{ctx.roundRect(x,y,w,h,r);}catch(e){ctx.rect(x,y,w,h);}}

function drawCumChart(td){
  const ctx=getCtx('cc');if(!ctx)return;const W=ctx._w,H=ctx._h,P={t:16,r:20,b:28,l:52};const cW=W-P.l-P.r,cH=H-P.t-P.b;

  const dL=depsCumLine();
  const maxWork=Math.max(ce,GCAM);const maxDep=Math.max(...dL.filter(v=>v!=null),START);

  const n=allDays.length;

  if(mode!=='deps'){ctx.fillStyle='rgba(34,197,94,.06)';ctx.fillRect(P.l,yp(GCAM),cW,yp(GHIGH)-yp(GCAM));}
  [0,.2,.4,.6,.8,1].forEach(f=>{const y=yp(mx*f);ctx.strokeStyle='#1e2d42';ctx.lineWidth=1;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#475569';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText('$'+Math.round(mx*f/1000)+'k',P.l-4,y+3);});

  goals.forEach(g=>{if(g.v>mx)return;const gy=yp(g.v);ctx.strokeStyle=g.c;ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(P.l,gy);ctx.lineTo(W-P.r,gy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=g.c;ctx.font='bold 8px DM Mono,monospace';ctx.textAlign='right';ctx.fillText('$'+g.v/1000+'k',W-P.r-2,gy-3);});
  // Work lines
  if(mode==='work'||mode==='both'){
    ctx.strokeStyle='#6366f1';ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();eL.forEach((v,i)=>i===0?ctx.moveTo(xp(i),yp(v)):ctx.lineTo(xp(i),yp(v)));ctx.stroke();
    const pts=aL.map((v,i)=>v!=null?{x:xp(i),y:yp(v),v,exp:eL[i]}:null).filter(Boolean);
    if(pts.length>1){for(let i=1;i<pts.length;i++){const p0=pts[i-1],p1=pts[i];ctx.strokeStyle=p1.v>=p1.exp?'#4ade80':'#ef4444';ctx.lineWidth=2.5;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();}
    const last=pts[pts.length-1];const ahd=last.v>=last.exp;const gr=ctx.createLinearGradient(0,P.t,0,H-P.b);gr.addColorStop(0,ahd?'rgba(74,222,128,.12)':'rgba(239,68,68,.08)');gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.moveTo(pts[0].x,H-P.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(last.x,H-P.b);ctx.closePath();ctx.fill();

}

function drawWkChart(){

function drawSavChart(td){

  const depMap={};(state.deps||[]).filter(d=>d.dateSent&&d.amtSav>0).sort((a,b)=>a.dateSent<b.dateSent?-1:1).forEach(d=>{depMap[d.dateSent]=(depMap[d.dateSent]||0)+(d.amtSav||0);});

  const mx=Math.max(peak,mode==='work'?Math.max(ce,GCAM):GMIN,GTGT)*1.1;const n=plotDays.length;

  ctx.fillStyle='#0e1520';ctx.beginPath();rr(ctx,0,0,W,H,8);ctx.fill();
  const gridVs=[0,1000,2000,3000,4000,5000,GMIN,GTGT].filter(v=>v<=mx);
  gridVs.forEach(v=>{const y=yp(v);ctx.strokeStyle='#1e2d42';ctx.lineWidth=1;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#475569';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText(v>=1000?'$'+v/1000+'k':'$'+v,P.l-4,y+3);});
  let pm=-1;plotDays.forEach((ds,i)=>{const mo=new Date(ds+'T12:00:00').getMonth();if(mo!==pm){pm=mo;const x=xp(i);ctx.strokeStyle='#2a3a52';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,H-P.b);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#475569';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText(['Apr','May','Jun','Jul','Aug'][mo-3]||'',x,H-P.b+14);}});
  [{v:GMIN,c:'#6366f1',l:'$5.5k'},{v:GTGT,c:'#3b82f6',l:'$6k'},{v:GHIGH,c:'#22c55e',l:'$6.5k'}].forEach(g=>{if(g.v>mx)return;const gy=yp(g.v);ctx.strokeStyle=g.c;ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(P.l,gy);ctx.lineTo(W-P.r,gy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=g.c;ctx.font='bold 8px DM Mono,monospace';ctx.textAlign='right';ctx.fillText(g.l,W-P.r-2,gy-3);});
  // Work lines
  if(mode==='work'||mode==='both'){
    ctx.strokeStyle='#6366f1';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();eL.forEach((v,i)=>i===0?ctx.moveTo(xp(allDays.findIndex(d=>d.ds===plotDays[i])),yp(v)):ctx.lineTo(xp(allDays.findIndex(d=>d.ds===plotDays[i])),yp(v)));ctx.stroke();ctx.setLineDash([]);
    const wPts=aL.map((v,i)=>v!=null?{x:xp(i),y:yp(v)}:null).filter(Boolean);
    if(wPts.length>1){ctx.strokeStyle='#34d399';ctx.lineWidth=2;ctx.beginPath();wPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();}
  }
  // Deposits line
  if(mode==='deps'||mode==='both'){
    const pts=balLine.map((v,i)=>v!=null?{x:xp(i),y:yp(v)}:null).filter(Boolean);
    if(pts.length>0){const gr=ctx.createLinearGradient(0,P.t,0,H-P.b);gr.addColorStop(0,'rgba(74,222,128,.2)');gr.addColorStop(1,'rgba(74,222,128,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.moveTo(xp(0),H-P.b);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H-P.b);ctx.closePath();ctx.fill();ctx.strokeStyle='#4ade80';ctx.lineWidth=2.5;ctx.setLineDash([]);ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    let rc=START;(state.deps||[]).filter(d=>d.dateSent&&d.amtSav>0).sort((a,b)=>a.dateSent<b.dateSent?-1:1).forEach(d=>{rc+=d.amtSav||0;const i2=plotDays.indexOf(d.dateSent);if(i2<0||d.dateSent>td2)return;ctx.fillStyle='#fbbf24';ctx.strokeStyle='#0e1520';ctx.lineWidth=2;ctx.beginPath();ctx.arc(xp(i2),yp(rc),5,0,Math.PI*2);ctx.fill();ctx.stroke();});
    const last=pts[pts.length-1];ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(last.x,last.y,5,0,Math.PI*2);ctx.fill();
    }else{ctx.fillStyle='#475569';ctx.font='11px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Log your first deposit to see the chart',P.l+cW/2,P.t+cH/2);}
  }
  if(ti2>=0){const tx=xp(ti2);ctx.strokeStyle='#fbbf2460';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(tx,P.t);ctx.lineTo(tx,H-P.b);ctx.stroke();ctx.setLineDash([]);}
}

// ── MAIN RENDER ────────────────────────────────────────────────────────
function render(){
  const td=today();const totExp=totalExpenses();const pp=compPP(td);const tab=state.ui.tab||'earn';
  document.getElementById('app').innerHTML=`<div class="sync-bar"><span id="ss" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3)">Sync ready</span><button class="sync-btn" onclick="manualSync()">↕ Sync now</button></div><div class="tab-bar"><button class="tab-btn${tab==='earn'?' active':''}" onclick="setTab('earn')">💰 Making Money</button><button class="tab-btn${tab==='manage'?' active':''}" onclick="setTab('manage')">🏦 Managing Money</button></div><div class="tab-con">${tab==='earn'?renderEarn(td,pp,totExp):renderManage(td,pp,totExp)}</div>`;
  if(!SYNC_ON)setTimeout(()=>setSS('offline'),50);
  setTimeout(()=>{if(tab==='earn'){drawCumChart(td);drawWkChart();}else drawSavChart(td);},120);
  if(!Object.keys(state.ui).some(k=>k.startsWith('w'))){const cwi=weeks.findIndex(wk=>wk.some(d=>d.ds===today()));if(cwi>=0){state.ui['w'+cwi]=true;}}
}

// ── INIT ───────────────────────────────────────────────────────────────
loadState();
if(SYNC_ON)pullSheets().then(()=>render());else render();
</script>
